services:
  lab:
    build:
      context: ./repo
      dockerfile: deploy/Dockerfile
    container_name: lab
    restart: unless-stopped
    environment:
      APP_NAME: lab
      APP_PORT: 8080
    expose:
      - "8080"
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.lab.rule=Host(`${LAB_HOSTNAME}`)
      - traefik.http.routers.lab.entrypoints=websecure
      - traefik.http.routers.lab.tls=true
      - traefik.http.routers.lab.tls.certresolver=letsencrypt
      - traefik.http.services.lab.loadbalancer.server.port=8080
      - traefik.http.routers.lab-http.rule=Host(`${LAB_HOSTNAME}`)
      - traefik.http.routers.lab-http.entrypoints=web
      - traefik.http.routers.lab-http.middlewares=lab-https-redirect
      - traefik.http.middlewares.lab-https-redirect.redirectscheme.scheme=https

networks:
  web:
    external: true
