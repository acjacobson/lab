name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run tests
        run: ./scripts/test.sh
      - name: Build container image
        run: docker build -f deploy/Dockerfile -t lab:ci .
      - name: Smoke test container
        run: |
          docker run -d --rm --name lab-ci -p 8080:8080 lab:ci
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:8080/healthz && break
            sleep 1
          done
          BASE_URL=http://127.0.0.1:8080 ./scripts/smoke.sh
          docker stop lab-ci
