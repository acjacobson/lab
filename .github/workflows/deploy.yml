name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
      LAB_HOSTNAME: ${{ secrets.LAB_HOSTNAME }}
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
      LAB_COMMIT: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_APP_DIR"
          test -n "$LAB_HOSTNAME"

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_APP_DIR='$DEPLOY_APP_DIR' LAB_HOSTNAME='$LAB_HOSTNAME' LAB_COMMIT='$LAB_COMMIT' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$DEPLOY_APP_DIR"
          cd "$DEPLOY_APP_DIR"

          if [ ! -d repo/.git ]; then
            git clone https://github.com/acjacobson/lab.git repo
          fi

          git -C repo fetch origin
          git -C repo checkout main
          git -C repo reset --hard "$LAB_COMMIT"

          cp repo/deploy/docker-compose.prod.yml docker-compose.yml
          printf 'LAB_HOSTNAME=%s\n' "$LAB_HOSTNAME" > .env

          docker compose up -d --build lab
          docker exec lab python -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=10).read().decode())"
          REMOTE

      - name: Optional external smoke test
        if: env.DEPLOY_URL != ''
        run: curl -fsS "$DEPLOY_URL/healthz"
