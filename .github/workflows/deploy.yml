name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  trigger-apphost-deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Apphost deployment
        env:
          APPHOST_DISPATCH_TOKEN: ${{ secrets.APPHOST_DISPATCH_TOKEN }}
        run: |
          if [ -z "$APPHOST_DISPATCH_TOKEN" ]; then
            echo "APPHOST_DISPATCH_TOKEN is not set. Skipping deployment trigger."
            echo "Add a token with permission to run workflows in acjacobson/apphost to enable automatic deploys."
            exit 0
          fi

          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $APPHOST_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/acjacobson/apphost/actions/workflows/deploy-lab.yml/dispatches \
            -d '{"ref":"main"}'
